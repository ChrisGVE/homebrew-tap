name: Update codesize formula

on:
  repository_dispatch:
    types: [codesize-release-published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 0.1.0)'
        required: true
      darwin_arm64_sha256:
        description: 'SHA256 for darwin-arm64 tarball'
        required: true
      darwin_x64_sha256:
        description: 'SHA256 for darwin-x64 tarball'
        required: true
      linux_x64_sha256:
        description: 'SHA256 for linux-x64 tarball'
        required: true
      linux_arm64_sha256:
        description: 'SHA256 for linux-arm64 tarball'
        required: true

jobs:
  update:
    name: Update formula version and checksums
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set variables
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "darwin_arm64=${{ github.event.inputs.darwin_arm64_sha256 }}" >> $GITHUB_OUTPUT
            echo "darwin_x64=${{ github.event.inputs.darwin_x64_sha256 }}" >> $GITHUB_OUTPUT
            echo "linux_x64=${{ github.event.inputs.linux_x64_sha256 }}" >> $GITHUB_OUTPUT
            echo "linux_arm64=${{ github.event.inputs.linux_arm64_sha256 }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.event.client_payload.version }}" >> $GITHUB_OUTPUT
            echo "darwin_arm64=${{ github.event.client_payload.darwin_arm64_sha256 }}" >> $GITHUB_OUTPUT
            echo "darwin_x64=${{ github.event.client_payload.darwin_x64_sha256 }}" >> $GITHUB_OUTPUT
            echo "linux_x64=${{ github.event.client_payload.linux_x64_sha256 }}" >> $GITHUB_OUTPUT
            echo "linux_arm64=${{ github.event.client_payload.linux_arm64_sha256 }}" >> $GITHUB_OUTPUT
          fi

      - name: Update formula
        run: |
          RAW_VERSION="${{ steps.vars.outputs.version }}"
          VERSION="${RAW_VERSION#v}"
          FORMULA="Formula/codesize.rb"

          sed -i "s/version \".*\"/version \"${VERSION}\"/" "$FORMULA"

          SHA="${{ steps.vars.outputs.darwin_arm64 }}"
          if [ -n "$SHA" ]; then
            sed -i "/darwin-arm64/,/sha256/{s|# sha256.*|sha256 \"${SHA}\"|;s|sha256 \"[a-f0-9]\{64\}\"|sha256 \"${SHA}\"|}" "$FORMULA"
          fi

          SHA="${{ steps.vars.outputs.darwin_x64 }}"
          if [ -n "$SHA" ]; then
            sed -i "/darwin-x64/,/sha256/{s|# sha256.*|sha256 \"${SHA}\"|;s|sha256 \"[a-f0-9]\{64\}\"|sha256 \"${SHA}\"|}" "$FORMULA"
          fi

          SHA="${{ steps.vars.outputs.linux_arm64 }}"
          if [ -n "$SHA" ]; then
            sed -i "/linux-arm64/,/sha256/{s|# sha256.*|sha256 \"${SHA}\"|;s|sha256 \"[a-f0-9]\{64\}\"|sha256 \"${SHA}\"|}" "$FORMULA"
          fi

          SHA="${{ steps.vars.outputs.linux_x64 }}"
          if [ -n "$SHA" ]; then
            sed -i "/linux-x64/,/sha256/{s|# sha256.*|sha256 \"${SHA}\"|;s|sha256 \"[a-f0-9]\{64\}\"|sha256 \"${SHA}\"|}" "$FORMULA"
          fi

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          title: "formula: update codesize to ${{ steps.vars.outputs.version }}"
          body: |
            Automated formula update for codesize v${{ steps.vars.outputs.version }}.

            - Updated version
            - Updated SHA256 checksums for all platforms

            Release: https://github.com/ChrisGVE/codesize/releases/tag/v${{ steps.vars.outputs.version }}
          branch: update-codesize-${{ steps.vars.outputs.version }}
          commit-message: "formula: update codesize to ${{ steps.vars.outputs.version }}"
