name: Formula Test

on:
  push:
    branches: [main]
    paths: ['Formula/**']
  pull_request:
    branches: [main]
    paths: ['Formula/**']
  workflow_dispatch:

jobs:
  audit:
    name: Audit formula
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Register as tap
        run: |
          mkdir -p "$(brew --repository)/Library/Taps/chrisgve"
          ln -s "$GITHUB_WORKSPACE" "$(brew --repository)/Library/Taps/chrisgve/homebrew-tap"

      - name: Audit formula
        run: brew audit --except=checksum --formula workspace-qdrant-mcp

  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Homebrew
        if: runner.os == 'Linux'
        run: |
          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          echo "/home/linuxbrew/.linuxbrew/bin" >> "$GITHUB_PATH"

      - name: Register as tap
        run: |
          mkdir -p "$(brew --repository)/Library/Taps/chrisgve"
          ln -s "$GITHUB_WORKSPACE" "$(brew --repository)/Library/Taps/chrisgve/homebrew-tap"

      - name: Install formula
        run: |
          echo "::stop-commands::brew-install"
          brew install --formula workspace-qdrant-mcp || {
            echo "::brew-install::"
            echo "Install failed — this is expected until the first release publishes tarballs"
            exit 0
          }
          echo "::brew-install::"

      - name: Smoke test
        run: |
          if command -v wqm &>/dev/null; then
            wqm --version
            memexd --help | head -5
          else
            echo "Binaries not installed (pre-release), skipping smoke test"
          fi
